    <meta name="application-name" content="Youssef Ahmed Personal Training" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <!-- ===== PRIMARY SEO META ===== -->
    <title>Youssef Ahmed Personal Training</title>
    <meta name="description" content="Science-based personal training in Dubai for fat loss, muscle gain, movement quality, and long-term performance." />
    <meta name="theme-color" content="#0b1220" />
    <link rel="canonical" href="https://youssef-booking.vercel.app/" />

    <!-- ===== Structured data (LocalBusiness / PersonalTrainer) =====
         Helps Google, Bing, WhatsApp link previews, and Search Console
         understand the brand. Pure JSON-LD, no script execution. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": ["LocalBusiness", "HealthAndBeautyBusiness"],
      "name": "Youssef Ahmed Personal Training",
      "description": "Science-based personal training in Dubai for fat loss, muscle gain, movement quality, and long-term performance.",
      "url": "https://youssef-booking.vercel.app/",
      "image": "https://youssef-booking.vercel.app/og-hero-current.jpg",
      "priceRange": "$$",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Dubai",
        "addressCountry": "AE"
      },
      "areaServed": {
        "@type": "City",
        "name": "Dubai"
      },
      "founder": {
        "@type": "Person",
        "name": "Youssef Ahmed",
        "jobTitle": "Personal Trainer",
        "worksFor": {
          "@type": "Organization",
          "name": "Youssef Ahmed Personal Training"
        }
      },
      "knowsAbout": [
        "Personal Training",
        "Strength and Conditioning",
        "Fat Loss",
        "Muscle Gain",
        "Movement Quality",
        "Body Composition Analysis",
        "InBody Tracking"
      ]
    }
    </script>

    <!-- ===== OPEN GRAPH (Facebook, WhatsApp, LinkedIn, Telegram, iMessage) ===== -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Youssef Ahmed Personal Training" />
    <meta property="og:title" content="Youssef Ahmed Personal Training" />
    <meta property="og:description" content="Science-based personal training in Dubai for fat loss, muscle gain, movement quality, and long-term performance." />
    <meta property="og:url" content="https://youssef-booking.vercel.app/" />
    <!--
      og:image points at /og-hero-current.jpg — generated at build time by
      scripts/generate-og-hero.mjs from the *current* active homepage hero
      (Neon `hero_images` row where is_active = true). The ?v=current token
      is replaced with the OG file's content-hash during `npm run build`,
      so whenever the admin swaps the hero the social URL changes too and
      WhatsApp / FB / LinkedIn re-scrape automatically. No manual step.
    -->
    <meta property="og:image" content="https://youssef-booking.vercel.app/og-hero-current.jpg?v=current" />
    <meta property="og:image:secure_url" content="https://youssef-booking.vercel.app/og-hero-current.jpg?v=current" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Youssef Ahmed — Elite Personal Training in Dubai" />
    <meta property="og:locale" content="en_US" />

    <meta name="twitter:image:alt" content="Youssef Ahmed — Elite Personal Training in Dubai" />

    <!-- ===== HERO STATIC PRELOAD (May 2026, FINAL flash kill) =====
         The single source of truth for the hero's first paint. This
         preload + the matching <img src="/hero-initial.webp"> in
         HeroSlider.tsx form a closed system that requires NO JS,
         NO API call, NO global window state to render the photo on
         the very first frame. The static .webp file lives in
         client/public/ (committed to git) and is refreshed by
         scripts/inject-hero.mjs on every Vercel deploy from the
         current active hero in Neon — so the static file is always
         in sync with the admin's choice without ever being stale.
         Placed BEFORE the font preconnects so the image gets
         priority — the image is the LCP element on the homepage. -->
    <link rel="preload" as="image" href="/hero-initial.webp" fetchpriority="high">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- ===== HERO PRE-BOOTSTRAP (May 2026) =====
         Root cause this fixes: previously the homepage rendered a flat
         dark gradient for ~300-800ms while the app went HTML → JS bundle
         → React mount → useQuery fires → /api/hero-images network
         response → first paint of the photo. The visible flash was the
         gap between "React mounted" and "image data arrived".

         Fix: kick off the /api/hero-images fetch the instant the HTML
         parser sees this script (in parallel with the JS bundle download
         and the font CSS), stash the parsed result on a global so the
         React hook can read it via TanStack Query's `initialData`, AND
         dynamically inject a `<link rel="preload" as="image" fetchpriority="high">`
         for the first slide's data URL so the browser's image decoder
         starts work before React even mounts.

         The script is intentionally tiny (no dependencies, no async/await
         to keep the bundle compatible with old in-app browsers) and is
         a best-effort warm-up — if it fails for any reason, React's
         normal useQuery fetch on mount picks up where it left off and
         the page works exactly as before. NO BACKEND CHANGES required:
         we read the existing /api/hero-images endpoint. -->
    <script>
      (function () {
        try {
          // If the build-time bake script (scripts/inject-hero.mjs)
          // already injected the first slide above, both
          // `window.__HERO_BAKED__` and `window.__INITIAL_HERO_IMAGES__`
          // are already set AND the `<link rel="preload" as="image">`
          // for the first image is already in the DOM — there is
          // literally nothing to do for the first paint. We still
          // fire the fetch to refresh the FULL slide list (admin may
          // have added slides since the last deploy and the rotating
          // slider needs them all), but we no longer create a second
          // preload link.
          var alreadyBaked = !!window.__HERO_BAKED__;
          // Capture the baked seed BEFORE the fetch so we can restore
          // it on any failure. Critical: a transient API failure
          // (502, network blip, 429) must NEVER wipe the baked seed
          // and lock the hero into an empty state for the session
          // (the global `staleTime: Infinity` would make the empty
          // result sticky until a hard navigation).
          var bakedSeed = Array.isArray(window.__INITIAL_HERO_IMAGES__)
            ? window.__INITIAL_HERO_IMAGES__.slice()
            : null;
          var boot = fetch("/api/hero-images", { credentials: "include" })
            .then(function (r) {
              // Throw on non-OK so the .catch below preserves the
              // baked seed. Returning `[]` here would silently
              // overwrite the seed with an empty list.
              if (!r.ok) throw new Error("hero-images " + r.status);
              return r.json();
            })
            .then(function (list) {
              var arr = Array.isArray(list) ? list : [];
              // Defensive: if API returns an empty list but we have
              // a baked seed (deploy was made WITH a slide and the
              // table hasn't been emptied), prefer the seed. This
              // protects against a brief admin-side race where a
              // slide is being re-uploaded.
              if (arr.length === 0 && bakedSeed && bakedSeed.length > 0) {
                window.__INITIAL_HERO_IMAGES__ = bakedSeed;
                return bakedSeed;
              }
              // Otherwise the API is the source of truth — overwrite.
              window.__INITIAL_HERO_IMAGES__ = arr;
              // Skip synthetic preload if the build-time bake already
              // did it. Only inject when no bake happened (e.g. local
              // dev preview, or a deploy that ran without DATABASE_URL).
              if (!alreadyBaked) {
                var first = arr.filter(function (s) {
                  return s && s.isActive !== false && s.imageDataUrl;
                })[0];
                if (first && first.imageDataUrl) {
                  var link = document.createElement("link");
                  link.rel = "preload";
                  link.as = "image";
                  link.href = first.imageDataUrl;
                  link.setAttribute("fetchpriority", "high");
                  document.head.appendChild(link);
                }
              }
              return arr;
            })
            .catch(function () {
              // FAILURE PATH: never overwrite a non-empty baked seed.
              // Only set the global to [] if nothing was baked AND
              // nothing was set by a previous run. This ensures a
              // transient API failure leaves the hero showing the
              // baked photo instead of falling back to gradient.
              if (bakedSeed && bakedSeed.length > 0) {
                window.__INITIAL_HERO_IMAGES__ = bakedSeed;
                return bakedSeed;
              }
              if (!Array.isArray(window.__INITIAL_HERO_IMAGES__)) {
                window.__INITIAL_HERO_IMAGES__ = [];
              }
              return window.__INITIAL_HERO_IMAGES__;
            });
          // Expose the in-flight promise so React's queryFn can
          // `await` it without firing a second fetch.
          window.__HERO_BOOT__ = boot;
        } catch (e) {
          if (!Array.isArray(window.__INITIAL_HERO_IMAGES__)) {
            window.__INITIAL_HERO_IMAGES__ = [];
          }
        }
      })();
    </script>
