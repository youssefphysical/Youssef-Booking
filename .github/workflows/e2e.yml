name: E2E · Playwright browser tests

# Runs the full Playwright e2e suite on every push / pull-request across all
# branches so regressions are caught before code reaches main.  The job:
#   1. Installs Node deps
#   2. Downloads the Chromium browser used by Playwright
#   3. Builds the app
#   4. Starts the Express+Vite server in the background
#   5. Waits until :5000 is accepting connections
#   6. Runs every spec under ./e2e:
#        - admin-login.spec.ts
#        - booking-calendar.spec.ts
#        - client-registration.spec.ts
#        - csv-export.spec.ts
#        - wizard-onboarding.spec.ts   ← full 15-test wizard happy-path
#   7. Uploads the HTML report as a build artifact
#
# ── Blocking merges ─────────────────────────────────────────────────────────
# Branch protection on `main` is ACTIVE and blocks ALL merges (including repo
# admins / Youssef) when this check is red.  Current settings (set via API):
#   required_status_checks : strict=true, context="Playwright e2e"
#   enforce_admins         : true   ← admins cannot bypass a failing check
#   required_pull_request_reviews : 1 approving review, dismiss_stale=true
#
# To change these settings:
#   Repository → Settings → Branches → Edit branch protection rule for `main`
#     ✅  Require status checks to pass before merging
#         Required check: "Playwright e2e"
#     ✅  Require branches to be up to date before merging
#     ✅  Do not allow bypassing the above settings  (enforce_admins=true)
#
# ── Required GitHub repo secrets ────────────────────────────────────────────
#   DATABASE_URL    — Neon / Postgres connection string for the test database
#   JWT_SECRET      — any random string; used to sign JWTs
#   SESSION_SECRET  — any random string; used to sign session cookies
#   CRON_SECRET     — any random string; guards /api/cron/* routes
#   PUBLIC_APP_URL  — e.g. http://localhost:5000 (for email link generation)
#
# Optional:
#   RESEND_API_KEY  — leave blank to suppress transactional email in tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      PUBLIC_APP_URL: ${{ secrets.PUBLIC_APP_URL || 'http://localhost:5000' }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || '' }}
      NODE_ENV: development

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium browser
        run: npx playwright install chromium --with-deps

      - name: Build app
        run: npm run build

      - name: Start server
        run: |
          npm run start &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/ >/dev/null 2>&1; then
              echo "Server is ready after ${i}s"
              exit 0
            fi
            echo "Waiting for server... (${i}/30)"
            sleep 2
          done
          echo "::error::Server did not start within 60 s"
          exit 1

      - name: Run Playwright e2e tests (all specs)
        run: npx playwright test --reporter=list

      - name: Run wizard onboarding spec (explicit coverage gate)
        if: success() || failure()
        run: npx playwright test e2e/wizard-onboarding.spec.ts --reporter=list

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Stop server
        if: always()
        run: kill "$SERVER_PID" 2>/dev/null || true
