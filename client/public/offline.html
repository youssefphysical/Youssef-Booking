<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#050505" />
    <title>Offline · Youssef Ahmed</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.jpg" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #050505;
        --fg: #f5f9ff;
        --muted: #8a93a6;
        --primary: #5ee7ff;
        --primary-glow: rgba(94, 231, 255, 0.55);
        --success: #4ade80;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        min-height: 100dvh;
        background: var(--bg);
        color: var(--fg);
        font-family: "DM Sans", -apple-system, BlinkMacSystemFont,
          "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        overflow: hidden;
        overscroll-behavior: none;
        -webkit-tap-highlight-color: transparent;
      }
      .stage {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: env(safe-area-inset-top) max(1.5rem, env(safe-area-inset-right))
                 env(safe-area-inset-bottom) max(1.5rem, env(safe-area-inset-left));
        isolation: isolate;
      }
      .stage::before {
        content: "";
        position: absolute;
        inset: -10%;
        background:
          radial-gradient(ellipse 60% 45% at 50% 30%,
            rgba(94, 231, 255, 0.10), transparent 60%),
          radial-gradient(ellipse 50% 35% at 50% 90%,
            rgba(94, 231, 255, 0.06), transparent 60%);
        z-index: -2;
      }
      .stage::after {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(94, 231, 255, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(94, 231, 255, 0.04) 1px, transparent 1px);
        background-size: 48px 48px;
        mask-image: radial-gradient(ellipse 70% 60% at 50% 50%,
          rgba(0, 0, 0, 1), transparent 75%);
        -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 50%,
          rgba(0, 0, 0, 1), transparent 75%);
        animation: drift 32s linear infinite;
        z-index: -1;
        opacity: 0.7;
      }
      @keyframes drift {
        from { background-position: 0 0, 0 0; }
        to   { background-position: 48px 48px, 48px 48px; }
      }
      .card {
        max-width: 460px;
        width: 100%;
        text-align: center;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--primary);
        padding: 0.4rem 0.85rem;
        border: 1px solid rgba(94, 231, 255, 0.25);
        border-radius: 999px;
        background: rgba(94, 231, 255, 0.06);
        margin-bottom: 1.5rem;
        transition: color 0.3s ease, border-color 0.3s ease, background 0.3s ease;
      }
      .badge[data-online="true"] {
        color: var(--success);
        border-color: rgba(74, 222, 128, 0.35);
        background: rgba(74, 222, 128, 0.08);
      }
      .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: currentColor;
        box-shadow: 0 0 10px currentColor;
        animation: pulse 1.6s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.55; transform: scale(1); }
        50%      { opacity: 1;    transform: scale(1.25); }
      }
      h1 {
        font-family: "Plus Jakarta Sans", "DM Sans", sans-serif;
        font-weight: 700;
        font-size: clamp(1.6rem, 5vw, 2.2rem);
        line-height: 1.15;
        margin: 0 0 0.75rem;
        background: linear-gradient(180deg, #ffffff 0%, #c8d6e5 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      p {
        color: var(--muted);
        font-size: 14.5px;
        line-height: 1.6;
        margin: 0 0 1.75rem;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        padding: 0.85rem 1.5rem;
        font-weight: 600;
        font-size: 14px;
        color: #001016;
        background: var(--primary);
        border: none;
        border-radius: 14px;
        cursor: pointer;
        text-decoration: none;
        box-shadow:
          0 0 0 1px rgba(94, 231, 255, 0.45),
          0 8px 28px -6px var(--primary-glow);
        transition: transform 0.15s ease, box-shadow 0.2s ease, opacity 0.2s ease;
        -webkit-tap-highlight-color: transparent;
      }
      .btn:hover { transform: translateY(-1px); }
      .btn:active { transform: translateY(0); }
      .btn[disabled] { opacity: 0.6; cursor: progress; }
      .meta {
        margin-top: 1.5rem;
        font-size: 11.5px;
        color: rgba(255, 255, 255, 0.35);
        letter-spacing: 0.04em;
      }
      .hint {
        margin-top: 0.75rem;
        font-size: 12px;
        color: var(--success);
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      .hint[data-visible="true"] { opacity: 1; }
      @media (prefers-reduced-motion: reduce) {
        .stage::after { animation: none; }
        .dot { animation: none; }
        .btn, .badge, .hint { transition: none; }
      }
    </style>
  </head>
  <body>
    <main class="stage">
      <div class="card">
        <span class="badge" id="badge" data-online="false">
          <span class="dot"></span>
          <span id="badge-text">Offline</span>
        </span>
        <h1 id="title">You're offline.</h1>
        <p id="subtitle">
          Your connection dropped, but the app is still here.
          Reconnect and tap retry — your sessions, packages and
          progress are safe on the server.
        </p>
        <button
          type="button"
          class="btn"
          id="retry"
          aria-label="Retry connection"
        >
          <span id="retry-label">Retry</span>
        </button>
        <div class="hint" id="hint" data-visible="false">
          Connection restored. Reloading…
        </div>
        <div class="meta">Youssef Ahmed · Personal Training · Dubai</div>
      </div>
    </main>
    <script>
      // ===== Connection-restored auto-reload =====
      // The browser fires "online" the moment the network comes back.
      // We swap the badge to a green "Back online" pill and reload
      // automatically after a short pause so the user sees the
      // transition (not a jarring instant jump).
      (function () {
        var badge = document.getElementById("badge");
        var badgeText = document.getElementById("badge-text");
        var title = document.getElementById("title");
        var subtitle = document.getElementById("subtitle");
        var retry = document.getElementById("retry");
        var retryLabel = document.getElementById("retry-label");
        var hint = document.getElementById("hint");
        var reloading = false;

        function reload() {
          if (reloading) return;
          reloading = true;
          retry.setAttribute("disabled", "true");
          retryLabel.textContent = "Reloading…";
          // Tiny delay so the green badge + hint paint before nav.
          setTimeout(function () { location.reload(); }, 450);
        }

        function onOnline() {
          badge.setAttribute("data-online", "true");
          badgeText.textContent = "Back online";
          title.textContent = "You're back online.";
          subtitle.textContent =
            "Reconnecting to Youssef Ahmed Personal Training…";
          hint.setAttribute("data-visible", "true");
          reload();
        }

        retry.addEventListener("click", function () {
          // If we've already detected online, just reload. Otherwise
          // try a tiny same-origin probe — if it succeeds we're back.
          if (navigator.onLine === false) {
            // Optimistic retry — let location.reload handle the
            // failure path (browser will land us back here).
          }
          reload();
        });

        window.addEventListener("online", onOnline);

        // If the page loaded while we're already online (e.g. user
        // tapped a stale tab), surface the restored state immediately.
        if (navigator.onLine === true) {
          // Don't auto-reload here — the SW already fell through to
          // the offline page, so an instant reload could loop. Just
          // let the user see "Back online" + tap retry.
          badge.setAttribute("data-online", "true");
          badgeText.textContent = "Back online";
        }
      })();
    </script>
  </body>
</html>
