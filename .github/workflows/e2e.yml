name: E2E · Playwright browser tests

# Runs the full Playwright e2e suite on every push / pull-request across all
# branches so regressions are caught before code reaches main.  The job:
#   1. Installs Node deps
#   2. Downloads the Chromium browser used by Playwright
#   3. Builds the app
#   4. Pushes the Drizzle schema onto the CI Postgres service
#   5. Starts the Express+Vite server in the background
#   6. Waits until :5000 is accepting connections
#   7. Runs every spec under ./e2e:
#        - admin-login.spec.ts
#        - booking-calendar.spec.ts
#        - client-registration.spec.ts
#        - csv-export.spec.ts
#        - wizard-onboarding.spec.ts   <- full 15-test wizard happy-path
#   8. Uploads the HTML report as a build artifact
#
# -- Why a Postgres service? -------------------------------------------------
# DATABASE_URL in the GitHub secret is the Replit-internal Postgres host
# ("helium") which is unreachable from GitHub Actions runners.  Rather than
# pointing CI at the production Neon DB (polluting data + external latency),
# we spin up a local Postgres 16 service container and override DATABASE_URL
# to it.  `npx drizzle-kit push` creates all tables before the server starts.
#
# Root cause of "Server did not start within 60 s" (run #43):
#   Error: getaddrinfo EAI_AGAIN helium
#   The server crashed at ensureSchema() boot — port 5000 never bound.
#
# -- Blocking merges ---------------------------------------------------------
# Branch protection on `main` is ACTIVE and blocks ALL merges (including repo
# admins / Youssef) when this check is red.  Current settings (set via API):
#   required_status_checks        : strict=true, context="Playwright e2e"
#   enforce_admins                : true   <- admins cannot bypass a failing check
#   required_pull_request_reviews : 1 approving review, dismiss_stale=true
#   required_conversation_resolution : true  <- all PR comments must be resolved
#
# The status check context "Playwright e2e" matches the job `name:` below
# exactly -- a mismatch would make the required check unfulfillable.
#
# -- Required GitHub repo secrets --------------------------------------------
#   JWT_SECRET      -- any random string; used to sign JWTs
#   SESSION_SECRET  -- any random string; used to sign session cookies
#   CRON_SECRET     -- any random string; guards /api/cron/* routes
#   PUBLIC_APP_URL  -- e.g. http://localhost:5000 (for email link generation)
#
# DATABASE_URL is intentionally NOT read from secrets -- CI always uses the
# local Postgres service defined below (see env.DATABASE_URL).
#
# Optional:
#   RESEND_API_KEY  -- leave blank to suppress transactional email in tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  # Include event name so a push does not cancel a concurrent workflow_dispatch
  # for the same branch (and vice versa).
  group: e2e-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright e2e
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: youssef_test
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: cipass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Override the repo secret -- CI always uses the local service container.
      # The Replit-internal host ("helium") is unreachable from GitHub runners.
      DATABASE_URL: postgres://ci:cipass@localhost:5432/youssef_test
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      PUBLIC_APP_URL: ${{ secrets.PUBLIC_APP_URL || 'http://localhost:5000' }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || '' }}
      NODE_ENV: development
      # Raise auth rate-limit ceilings so the test suite (which registers
      # many accounts in quick succession) is never throttled in CI.
      RL_REGISTER_MAX: "30"
      RL_LOGIN_MAX: "30"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium browser
        run: npx playwright install chromium --with-deps

      - name: Build app
        run: npm run build

      - name: Push DB schema
        run: npx drizzle-kit push --force
        env:
          DATABASE_URL: postgres://ci:cipass@localhost:5432/youssef_test

      - name: Start server
        run: |
          npm run start &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/ >/dev/null 2>&1; then
              echo "Server is ready after ${i}s"
              exit 0
            fi
            echo "Waiting for server... (${i}/30)"
            sleep 2
          done
          echo "::error::Server did not start within 60 s"
          exit 1

      - name: Run Playwright e2e tests (all specs)
        run: npx playwright test --reporter=list

      - name: Run wizard onboarding spec (explicit coverage gate)
        if: success() || failure()
        run: npx playwright test e2e/wizard-onboarding.spec.ts --reporter=list

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Stop server
        if: always()
        run: kill "$SERVER_PID" 2>/dev/null || true

