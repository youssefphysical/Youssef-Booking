    <!-- ===== BRAND LOGO BOOT (flicker-free first paint) =====
         Reads the last-known brandSettings from localStorage (written by
         applyBrandCSSVars after every settings load) and applies all
         --brand-{slot}-* CSS vars to :root synchronously — before the JS
         bundle even begins to parse. Without this, logo images render at
         hardcoded fallback sizes for ~300–800 ms and then snap to the
         admin-configured dimensions once useSettings() resolves.
         The script is tiny, has zero dependencies, and is safe to fail:
         if localStorage is empty or corrupt, React's normal path takes over. -->
    <script>
      (function () {
        try {
          // Always apply defaults (+ cached values when available).
          // Do NOT early-return on empty cache — that leaves BrandLogo
          // painting at the hardcoded CSS fallbacks (wrong size) until
          // React's first useEffect fires, causing the micro-jump.
          var raw = localStorage.getItem('ye_brand_settings');
          var logos = null;
          try { var _s = raw ? JSON.parse(raw) : null; logos = _s && _s.logos; } catch(e) {}
          var root = document.documentElement;
          var slots = ['navbar','mobile','login','dashboard','footer','favicon','splash'];
          var defs = {
            navbar:    {wDesktop:0,  hDesktop:60, wMobile:0,   hMobile:52, zoom:100,hOffset:0,vOffset:0,padding:5, glow:35},
            mobile:    {wDesktop:0,  hDesktop:52, wMobile:0,   hMobile:44, zoom:100,hOffset:0,vOffset:0,padding:4, glow:25},
            login:     {wDesktop:480,hDesktop:0,  wMobile:360, hMobile:0,  zoom:108,hOffset:0,vOffset:0,padding:0, glow:40},
            dashboard: {wDesktop:0,  hDesktop:48, wMobile:0,   hMobile:40, zoom:100,hOffset:0,vOffset:0,padding:0, glow:20},
            footer:    {wDesktop:0,  hDesktop:22, wMobile:0,   hMobile:20, zoom:100,hOffset:0,vOffset:0,padding:0, glow:25},
            favicon:   {wDesktop:32, hDesktop:32, wMobile:16,  hMobile:16, zoom:100,hOffset:0,vOffset:0,padding:0, glow:0 },
            splash:    {wDesktop:0,  hDesktop:0,  wMobile:0,   hMobile:0,  zoom:100,hOffset:0,vOffset:0,padding:0, glow:50},
          };
          for (var i = 0; i < slots.length; i++) {
            var slot = slots[i];
            var d = defs[slot];
            var stored = (logos && logos[slot]) ? logos[slot] : {};
            var c = {};
            for (var k in d) c[k] = (stored[k] !== undefined) ? stored[k] : d[k];
            var p = '--brand-' + slot;
            root.style.setProperty(p+'-w-desktop', c.wDesktop > 0 ? c.wDesktop+'px' : 'auto');
            root.style.setProperty(p+'-h-desktop', c.hDesktop > 0 ? c.hDesktop+'px' : 'auto');
            root.style.setProperty(p+'-w-mobile',  c.wMobile  > 0 ? c.wMobile+'px'  : 'auto');
            root.style.setProperty(p+'-h-mobile',  c.hMobile  > 0 ? c.hMobile+'px'  : 'auto');
            root.style.setProperty(p+'-zoom',    String(c.zoom / 100));
            root.style.setProperty(p+'-hpos',    c.hOffset+'px');
            root.style.setProperty(p+'-vpos',    c.vOffset+'px');
            root.style.setProperty(p+'-padding', c.padding+'px');
            root.style.setProperty(p+'-glow',    String(c.glow / 100));
            if (slot === 'dashboard') {
              root.style.setProperty('--brand-sidebar-h-desktop', c.hDesktop > 0 ? c.hDesktop+'px' : 'auto');
              root.style.setProperty('--brand-sidebar-glow',      String(c.glow / 100));
            }
          }
        } catch (e) {}
      })();
    </script>

    <!-- ===== HERO PRE-BOOTSTRAP (May 2026) =====
         Root cause this fixes: previously the homepage rendered a flat
         dark gradient for ~300-800ms while the app went HTML → JS bundle
         → React mount → useQuery fires → /api/hero-images network
         response → first paint of the photo. The visible flash was the
         gap between "React mounted" and "image data arrived".

         Fix: kick off the /api/hero-images fetch the instant the HTML
         parser sees this script (in parallel with the JS bundle download
         and the font CSS), stash the parsed result on a global so the
         React hook can read it via TanStack Query's `initialData`, AND
         dynamically inject a `<link rel="preload" as="image" fetchpriority="high">`
         for the first slide's data URL so the browser's image decoder
         starts work before React even mounts.

         The script is intentionally tiny (no dependencies, no async/await
         to keep the bundle compatible with old in-app browsers) and is
         a best-effort warm-up — if it fails for any reason, React's
         normal useQuery fetch on mount picks up where it left off and
         the page works exactly as before. NO BACKEND CHANGES required:
         we read the existing /api/hero-images endpoint. -->
    <script>
      (function () {
        try {
          // If the build-time bake script (scripts/inject-hero.mjs)
          // already injected the first slide above, both
          // `window.__HERO_BAKED__` and `window.__INITIAL_HERO_IMAGES__`
          // are already set AND the `<link rel="preload" as="image">`
          // for the first image is already in the DOM — there is
          // literally nothing to do for the first paint. We still
          // fire the fetch to refresh the FULL slide list (admin may
          // have added slides since the last deploy and the rotating
          // slider needs them all), but we no longer create a second
          // preload link.
          var alreadyBaked = !!window.__HERO_BAKED__;
          // Capture the baked seed BEFORE the fetch so we can restore
          // it on any failure. Critical: a transient API failure
          // (502, network blip, 429) must NEVER wipe the baked seed
          // and lock the hero into an empty state for the session
          // (the global `staleTime: Infinity` would make the empty
          // result sticky until a hard navigation).
          var bakedSeed = Array.isArray(window.__INITIAL_HERO_IMAGES__)
            ? window.__INITIAL_HERO_IMAGES__.slice()
            : null;
          var boot = fetch("/api/hero-images", { credentials: "include" })
            .then(function (r) {
              // Throw on non-OK so the .catch below preserves the
              // baked seed. Returning `[]` here would silently
              // overwrite the seed with an empty list.
              if (!r.ok) throw new Error("hero-images " + r.status);
              return r.json();
            })
            .then(function (list) {
              var arr = Array.isArray(list) ? list : [];
              // Defensive: if API returns an empty list but we have
              // a baked seed (deploy was made WITH a slide and the
              // table hasn't been emptied), prefer the seed. This
              // protects against a brief admin-side race where a
              // slide is being re-uploaded.
              if (arr.length === 0 && bakedSeed && bakedSeed.length > 0) {
                window.__INITIAL_HERO_IMAGES__ = bakedSeed;
                return bakedSeed;
              }
              // Otherwise the API is the source of truth — overwrite.
              window.__INITIAL_HERO_IMAGES__ = arr;
              // Skip synthetic preload if the build-time bake already
              // did it. Only inject when no bake happened (e.g. local
              // dev preview, or a deploy that ran without DATABASE_URL).
              if (!alreadyBaked) {
                var first = arr.filter(function (s) {
                  return s && s.isActive !== false && s.imageDataUrl;
                })[0];
                if (first && first.imageDataUrl) {
                  var link = document.createElement("link");
                  link.rel = "preload";
                  link.as = "image";
                  link.href = first.imageDataUrl;
                  link.setAttribute("fetchpriority", "high");
                  document.head.appendChild(link);
                }
              }
              return arr;
            })
            .catch(function () {
              // FAILURE PATH: never overwrite a non-empty baked seed.
              // Only set the global to [] if nothing was baked AND
              // nothing was set by a previous run. This ensures a
              // transient API failure leaves the hero showing the
              // baked photo instead of falling back to gradient.
              if (bakedSeed && bakedSeed.length > 0) {
                window.__INITIAL_HERO_IMAGES__ = bakedSeed;
                return bakedSeed;
              }
              if (!Array.isArray(window.__INITIAL_HERO_IMAGES__)) {
                window.__INITIAL_HERO_IMAGES__ = [];
              }
              return window.__INITIAL_HERO_IMAGES__;
            });
          // Expose the in-flight promise so React's queryFn can
          // `await` it without firing a second fetch.
          window.__HERO_BOOT__ = boot;
        } catch (e) {
          if (!Array.isArray(window.__INITIAL_HERO_IMAGES__)) {
            window.__INITIAL_HERO_IMAGES__ = [];
          }
        }
      })();
    </script>


    <!-- ===== BRAND SETTINGS BOOT — flicker-free logo sizing =====
         Reads the JSON cached by persistBrandSettingsCache() and emits
         --brand-{slot}-* CSS vars SYNCHRONOUSLY before any font/React load.
         Without this, logos paint at default size then jump to saved size

    <script>
      (function () {
        try {
          var raw = localStorage.getItem("ye_brand_settings");
          var logos = null;
          try { var data = raw ? JSON.parse(raw) : null; logos = data && data.logos || null; } catch (e) {}
          var SLOTS = ["navbar","mobile","login","dashboard","footer","favicon","splash"];
          var DEFS = {
            navbar:    { wDesktop:0,  hDesktop:60,  wMobile:0,  hMobile:52,  zoom:100, hOffset:0, vOffset:0, padding:5,  glow:35, minHeroH:0   },
            mobile:    { wDesktop:0,  hDesktop:52,  wMobile:0,  hMobile:44,  zoom:100, hOffset:0, vOffset:0, padding:4,  glow:25, minHeroH:0   },

            dashboard: { wDesktop:0,  hDesktop:48,  wMobile:0,  hMobile:40,  zoom:100, hOffset:0, vOffset:0, padding:0,  glow:20, minHeroH:0   },
            footer:    { wDesktop:0,  hDesktop:22,  wMobile:0,  hMobile:20,  zoom:100, hOffset:0, vOffset:0, padding:0,  glow:25, minHeroH:0   },
            favicon:   { wDesktop:32, hDesktop:32,  wMobile:16, hMobile:16,  zoom:100, hOffset:0, vOffset:0, padding:0,  glow:0,  minHeroH:0   },
            splash:    { wDesktop:0,  hDesktop:0,   wMobile:0,  hMobile:0,   zoom:100, hOffset:0, vOffset:0, padding:0,  glow:50, minHeroH:0   }
          };
          var root = document.documentElement;
          for (var i = 0; i < SLOTS.length; i++) {
            var slot = SLOTS[i];
            var def = DEFS[slot];
            var c = Object.assign({}, def, logos[slot] || {});
            var p = "--brand-" + slot;
            root.style.setProperty(p + "-w-desktop", c.wDesktop > 0 ? c.wDesktop + "px" : "auto");
            root.style.setProperty(p + "-h-desktop", c.hDesktop > 0 ? c.hDesktop + "px" : "auto");
            root.style.setProperty(p + "-w-mobile",  c.wMobile  > 0 ? c.wMobile  + "px" : "auto");
            root.style.setProperty(p + "-h-mobile",  c.hMobile  > 0 ? c.hMobile  + "px" : "auto");
            root.style.setProperty(p + "-zoom",    String(c.zoom / 100));
            root.style.setProperty(p + "-hpos",    c.hOffset + "px");
            root.style.setProperty(p + "-vpos",    c.vOffset + "px");
            root.style.setProperty(p + "-padding",    c.padding + "px");
            root.style.setProperty(p + "-glow",       String(c.glow / 100));
            root.style.setProperty(p + "-min-hero-h", (c.minHeroH > 0 ? c.minHeroH : 0) + "px");
            if (slot === "dashboard") {
              root.style.setProperty("--brand-sidebar-h-desktop", c.hDesktop > 0 ? c.hDesktop + "px" : "auto");
              root.style.setProperty("--brand-sidebar-glow", String(c.glow / 100));
            }
          }
        } catch (e) {}
      })();
    </script>

    <!-- ===== SETTINGS BOOT — zero-localStorage logo preload =====
         Fires a fetch("/api/settings") the instant the HTML parser sees this
         script — in parallel with the JS bundle download, font CSS, and the
         hero-images fetch above.  Goal: by the time React mounts (~200-500 ms
         later on a fast connection) the promise has already resolved and the
         logo images are already in the browser's HTTP cache.

         Two globals are set so useSettings() can consume the result without
         opening a second TCP connection:
           window.__YE_SETTINGS_BOOT__     — the in-flight Promise<Settings|null>
           window.__YE_INITIAL_SETTINGS__  — the resolved Settings object (or null)

         On resolve, preload links are injected for every custom logo URL that
         the admin has configured (navbar, mobile, auth/login icons).  A
         cache-busting ?v=<ms> token is derived from settings.updatedAt so
         stale images never stick.

         Safety: only relative paths (starting with /) are preloaded — no
         arbitrary user-supplied external URLs ever touch the preload list.
         The script is best-effort: any failure leaves the app working normally
         via useSettings()'s standard fallback fetch. -->
    <script>
      (function () {
        try {
          window.__YE_SETTINGS_BOOT__ = fetch("/api/settings", { credentials: "include" })
            .then(function (r) {
              if (!r.ok) throw new Error("settings " + r.status);
              return r.json();
            })
            .then(function (s) {
              window.__YE_INITIAL_SETTINGS__ = s;

              // Cache-bust suffix derived from server updatedAt timestamp
              var bust = (s && s.updatedAt)
                ? ("?v=" + new Date(s.updatedAt).getTime())
                : "";

              // Collect unique logo URLs to preload — all 8 slots so every
              // placement gets a warm browser cache before React mounts.
              // Each entry mirrors the MM fallback chain used in the components:
              //   Navbar desktop : logoNavbarUrl  → logoIconUrl
              //   Mobile         : logoMobileUrl  → logoNavbarUrl → logoIconUrl
              //   Auth / Login   : logoLoginUrl   → logoAuthUrl   → logoIconUrl
              //   Sidebar        : logoDashboardUrl → logoIconUrl
              //   Footer         : logoFooterUrl  → logoIconUrl
              //   Splash screen  : logoSplashUrl  → logoIconUrl
              //   Favicon        : logoFaviconUrl (standalone, no chain)
              //   Icon (base)    : logoIconUrl
              var seen = {};
              var toPreload = [
                s.logoNavbarUrl    || s.logoIconUrl  || null,
                s.logoMobileUrl    || s.logoNavbarUrl || s.logoIconUrl || null,
                s.logoLoginUrl     || s.logoAuthUrl  || s.logoIconUrl || null,
                s.logoDashboardUrl || s.logoIconUrl  || null,
                s.logoFooterUrl    || s.logoIconUrl  || null,
                s.logoSplashUrl    || s.logoIconUrl  || null,
                s.logoFaviconUrl   || null,
                s.logoIconUrl      || null,
              ];

              for (var i = 0; i < toPreload.length; i++) {
                var url = toPreload[i];
                if (url && typeof url === "string" && url.charAt(0) === "/" && !seen[url]) {
                  seen[url] = 1;
                  var link = document.createElement("link");
                  link.rel = "preload";
                  link.as  = "image";
                  link.href = url + bust;
                  link.setAttribute("fetchpriority", "high");
                  document.head.appendChild(link);
                }
              }

              return s;
            })
            .catch(function () {
              window.__YE_INITIAL_SETTINGS__ = null;
              return null;
            });
        } catch (e) {
          window.__YE_INITIAL_SETTINGS__ = null;
        }
      })();
    </script>

    <!-- ===== FONTS (May 2026, "fonts diet") =====
         Audited and trimmed from 24 families to 2 — the only ones the
         design system actually uses:
           - DM Sans (--font-body)
           - Plus Jakarta Sans (--font-display)
         `Inter` in --font-display is a system fallback string only,
         never loaded. `Outfit` was historical and removed in HERO v6.
         display=swap keeps fallback text visible during the swap so
         no layout-shift / invisible-text. The CSS @import that was
         duplicating DM Sans + Outfit in index.css is also removed. -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body style="background:#050505;color-scheme:dark">
    <!-- Inline body bg = AMOLED #050505 paints on the very first
         frame BEFORE any CSS loads, killing the white flash on cold
         start (especially noticeable on Android Chrome / Samsung
         Internet when launched from the home-screen icon). The
         attribute matches manifest.background_color so the OS splash
         and the first React paint are visually identical. -->
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
