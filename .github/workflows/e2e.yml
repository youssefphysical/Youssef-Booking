name: E2E · Playwright browser tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright e2e
    runs-on: ubuntu-latest
    timeout-minutes: 35

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: youssef_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/youssef_ci
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      PUBLIC_APP_URL: ${{ secrets.PUBLIC_APP_URL || 'http://localhost:5000' }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || '' }}
      NODE_ENV: development

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium browser
        run: npx playwright install chromium --with-deps

      - name: Push database schema
        run: npm run db:push

      - name: Build app
        run: npm run build

      - name: Start server
        run: |
          npm run start &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/ >/dev/null 2>&1; then
              echo "Server is ready after ${i}s"
              exit 0
            fi
            echo "Waiting for server... (${i}/30)"
            sleep 2
          done
          echo "::error::Server did not start within 60 s"
          exit 1

      - name: Run Playwright e2e tests (all specs)
        run: npx playwright test --reporter=list

      - name: Run wizard onboarding spec (explicit coverage gate)
        if: success() || failure()
        run: npx playwright test e2e/wizard-onboarding.spec.ts --reporter=list

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Stop server
        if: always()
        run: kill "$SERVER_PID" 2>/dev/null || true
