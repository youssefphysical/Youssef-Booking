name: Booking auto-complete + reminders cron

# Hits /api/cron/reminders every 15 minutes. That endpoint runs:
#   - 24h + 1h booking reminder emails (idempotent via stamp columns)
#   - package expiry warning notifications
#   - missed weekly check-in notifications
#   - auto-complete pass for expired sessions (atomic claim, idempotent)
#
# Vercel Hobby plans cap crons at once-per-day, which is why this lives
# in GitHub Actions instead of vercel.json. The endpoint is idempotent —
# safe to invoke at any frequency.
#
# Required repo secrets:
#   - PUBLIC_APP_URL: e.g. https://youssef-booking.vercel.app
#   - CRON_SECRET:    must match the same env var on Vercel

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

jobs:
  trigger-cron:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hit /api/cron/reminders
        env:
          APP_URL: ${{ secrets.PUBLIC_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${APP_URL:-}" ] || [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::Missing PUBLIC_APP_URL or CRON_SECRET repo secret"
            exit 1
          fi
          response=$(curl -sS -w "\nHTTP_CODE:%{http_code}" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL%/}/api/cron/reminders")
          echo "$response"
          code=$(echo "$response" | tail -n1 | sed 's/HTTP_CODE://')
          if [ "$code" != "200" ]; then
            echo "::error::Cron returned HTTP $code"
            exit 1
          fi
